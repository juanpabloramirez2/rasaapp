# ─────────────────────────────────────────────────────────────────
# Propiedades comunes a todos los perfiles.
# Las credenciales y configuración sensible viven en
# application-dev.properties o application-prod.properties.
# ─────────────────────────────────────────────────────────────────

spring.application.name=rasaapp

# Servidor
server.port=8080

# Multipart (uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Ruta de uploads configurable por perfil
app.uploads.path=${UPLOADS_PATH:uploads}

# Recursos estáticos: classpath + carpeta de uploads
spring.web.resources.static-locations=classpath:/static/,file:${app.uploads.path}/

# Dialect de Hibernate (común para dev y prod con MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Deshabilitar Open Session in View (buena práctica)
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
