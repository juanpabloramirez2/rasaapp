# ─────────────────────────────────────────────────────────────────
# Perfil PROD — activar con: SPRING_PROFILES_ACTIVE=prod
# Todos los valores sensibles vienen de variables de entorno.
# ─────────────────────────────────────────────────────────────────

# Base de datos (inyectada por Docker/entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool HikariCP
spring.datasource.hikari.pool-name=RasaHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate — Flyway gestiona el schema, Hibernate no toca nada
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway — crea/migra el schema automáticamente al arrancar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# Admin del panel (inyectado por entorno)
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# Ruta de uploads dentro del contenedor (volumen Docker)
app.uploads.path=/app/uploads

# Thymeleaf (cache en producción)
spring.thymeleaf.cache=true

# Actuator — solo expone /health para el health check del contenedor
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Sesión
server.servlet.session.timeout=30m

# Logs
logging.level.root=WARN
logging.level.com.rasadeportes=INFO
