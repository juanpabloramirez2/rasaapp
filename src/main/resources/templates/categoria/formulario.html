<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head}">
  <title>Categoría</title>
</head>

<body data-pc-preset="preset-1" data-pc-direction="ltr" data-pc-theme="light">

  <div class="loader-bg">
    <div class="loader-track"><div class="loader-fill"></div></div>
  </div>

  <nav th:replace="~{layout/base :: sidebar}"></nav>
  <header th:replace="~{layout/base :: header}"></header>

  <div class="pc-container">
    <div class="pc-content">

      <div class="page-header">
        <div class="page-block">
          <div class="row align-items-center">
            <div class="col-md-12">
              <div class="page-header-title">
                <h5 class="m-b-10" th:text="${categoria.id} != null ? 'Editar Categoría' : 'Nueva Categoría'"></h5>
              </div>
              <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="/dashboard/productos">Home</a></li>
                <li class="breadcrumb-item"><a href="/dashboard/categorias">Categorías</a></li>
                <li class="breadcrumb-item" aria-current="page"
                    th:text="${categoria.id} != null ? 'Editar' : 'Nueva'"></li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 th:text="${categoria.id} != null ? 'Editar Categoría' : 'Nueva Categoría'"></h5>
            </div>
            <div class="card-body">
              <form th:action="@{/dashboard/categorias}"
                    th:object="${categoria}"
                    method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                  <label class="form-label fw-semibold">Nombre</label>
                  <input type="text"
                         class="form-control"
                         th:field="*{nombre}"
                         placeholder="Ej: Florete, Espada, Sable..."
                         required>
                </div>

                <div class="d-flex gap-2 mt-4">
                  <button type="submit" class="btn btn-primary">
                    <i class="ti ti-device-floppy me-1"></i> Guardar
                  </button>
                  <a href="/dashboard/categorias" class="btn btn-light-secondary">
                    <i class="ti ti-arrow-left me-1"></i> Volver
                  </a>
                </div>

              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer th:replace="~{layout/base :: footer}"></footer>

  <script src="/mantis/assets/js/plugins/popper.min.js"></script>
  <script src="/mantis/assets/js/plugins/simplebar.min.js"></script>
  <script src="/mantis/assets/js/plugins/bootstrap.min.js"></script>
  <script src="/mantis/assets/js/fonts/custom-font.js"></script>
  <script src="/mantis/assets/js/pcoded.js"></script>
  <script src="/mantis/assets/js/plugins/feather.min.js"></script>
  <script>layout_change('light');</script>
  <script>change_box_container('false');</script>
  <script>layout_rtl_change('false');</script>
  <script>preset_change("preset-1");</script>
  <script>font_change("Public-Sans");</script>

</body>
</html>
