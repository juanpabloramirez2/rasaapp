<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head}">
    <title th:text="${variante.id} != null ? 'Editar Variante' : 'Nueva Variante'"></title>
</head>

<body data-pc-preset="preset-1" data-pc-direction="ltr" data-pc-theme="light">

    <div class="loader-bg">
        <div class="loader-track"><div class="loader-fill"></div></div>
    </div>

    <nav th:replace="~{layout/base :: sidebar}"></nav>
    <header th:replace="~{layout/base :: header}"></header>

    <div class="pc-container">
        <div class="pc-content">

            <div class="page-header">
                <div class="page-block">
                    <div class="row align-items-center">
                        <div class="col-md-12">
                            <div class="page-header-title">
                                <h5 class="m-b-10">
                                    <span th:text="${variante.id} != null ? 'Editar Variante' : 'Nueva Variante'"></span>
                                    <small class="text-muted" th:text="' - ' + ${producto.nombre}"></small>
                                </h5>                           
                            </div>
                            <ul class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/dashboard/productos">Productos</a></li>
                                <li class="breadcrumb-item"><a th:href="@{/dashboard/variantes/producto/{id}(id=${productoId})}" th:text="'Variantes de ' + ${producto.nombre}"></a></li>
                                <li class="breadcrumb-item" aria-current="page" th:text="${variante.id} != null ? 'Editar' : 'Nueva'"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card"> <div class="card-header">
                            <h5 th:text="${variante.id} != null ? 'Modificar Detalles de Variante' : 'Agregar Nueva Variante'"></h5>
                            <p class="text-muted mb-0">Producto: <strong th:text="${producto.nombre}"></strong></p>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/dashboard/variantes/guardar/{id}(id=${productoId})}" th:object="${variante}" method="post">
                                <input type="hidden" th:field="*{id}">

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Talla / Medida</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="ti ti-ruler-2"></i></span>
                                        <input type="text" class="form-control" th:field="*{talla}" placeholder="Ej: S, M, L o 42, 44...">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Color</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="ti ti-palette"></i></span>
                                        <input type="text" class="form-control" th:field="*{color}" placeholder="Ej: Negro, Azul Navy..." required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Cantidad en Stock</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="ti ti-box"></i></span>
                                        <input type="number" class="form-control" th:field="*{cantidad}" min="0" required>
                                    </div>
                                </div>

                                <div class="d-flex gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="ti ti-device-floppy me-1"></i> Guardar
                                    </button>
                                    <a th:href="@{/dashboard/variantes/producto/{id}(id=${productoId})}" class="btn btn-light-secondary">
                                        <i class="ti ti-arrow-left me-1"></i> Cancelar
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <script src="/mantis/assets/js/plugins/popper.min.js"></script>
    <script src="/mantis/assets/js/plugins/simplebar.min.js"></script>
    <script src="/mantis/assets/js/plugins/bootstrap.min.js"></script>
    <script src="/mantis/assets/js/fonts/custom-font.js"></script>
    <script src="/mantis/assets/js/pcoded.js"></script>
    <script src="/mantis/assets/js/plugins/feather.min.js"></script>
    <script>layout_change('light'); change_box_container('false'); layout_rtl_change('false'); preset_change("preset-1"); font_change("Public-Sans");</script>
</body>
</html>
