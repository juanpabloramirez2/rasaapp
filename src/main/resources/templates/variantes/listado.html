<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head}">
    <title>Variantes de Producto</title>
</head>

<body data-pc-preset="preset-1" data-pc-direction="ltr" data-pc-theme="light">

    <div class="loader-bg">
        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>
    </div>

    <nav th:replace="~{layout/base :: sidebar}"></nav>

    <header th:replace="~{layout/base :: header}"></header>

    <div class="pc-container">
        <div class="pc-content">

            <div class="page-header">
                <div class="page-block">
                    <div class="row align-items-center">
                        <div class="col-md-12">
                            <div class="page-header-title">
                                <h5 class="m-b-10">Gestión de Variantes</h5>
                            </div>
                            <ul class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/dashboard/productos">Productos</a></li>
                                <li class="breadcrumb-item" aria-current="page">Variantes</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="m-b-10" th:text="'Variantes de ' + ${producto.nombre}"></h5>
                            <a th:href="@{/dashboard/variantes/nueva/{id}(id=${productoId})}" 
                               class="btn btn-primary btn-sm d-flex align-items-center">
                                <i class="ti ti-plus me-1"></i> Nueva Variante
                            </a>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover table-borderless mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th>Talla</th>
                                            <th>Color</th>
                                            <th>Stock / Cantidad</th>
                                            <th class="text-end">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="var : ${variantes}">
                                            <td>
                                                <span class="badge bg-light-secondary text-dark" th:text="${var.talla}"></span>
                                            </td>
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <i class="ti ti-circle-filled me-2" style="color: #6c757d;"></i>
                                                    <span th:text="${var.color}"></span>
                                                </div>
                                            </td>
                                            <td>
                                                <h6 class="mb-0" th:text="${var.cantidad}"></h6>
                                            </td>
                                            <td class="text-end">
                                                <a th:href="@{/dashboard/variantes/editar/{id}(id=${var.id})}"
                                                class="btn btn-icon btn-light-primary btn-sm me-2">
                                                    <i class="ti ti-edit"></i>
                                                </a>
                                                <a th:href="@{/dashboard/variantes/eliminar/{id}(id=${var.id})}"
                                                   class="btn btn-icon btn-light-danger btn-sm"
                                                   onclick="return confirm('¿Estás seguro de eliminar esta variante?')">
                                                    <i class="ti ti-trash"></i>
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(variantes)}">
                                            <td colspan="4" class="text-center text-muted py-4">
                                                No hay variantes registradas para este producto.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>

    <script src="/mantis/assets/js/plugins/popper.min.js"></script>
    <script src="/mantis/assets/js/plugins/simplebar.min.js"></script>
    <script src="/mantis/assets/js/plugins/bootstrap.min.js"></script>
    <script src="/mantis/assets/js/fonts/custom-font.js"></script>
    <script src="/mantis/assets/js/pcoded.js"></script>
    <script src="/mantis/assets/js/plugins/feather.min.js"></script>
    <script>layout_change('light');</script>
    <script>change_box_container('false');</script>
    <script>layout_rtl_change('false');</script>
    <script>preset_change("preset-1");</script>
    <script>font_change("Public-Sans");</script>

</body>
</html>
