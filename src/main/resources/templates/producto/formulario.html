<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head}">
  <title>Producto</title>
</head>

<body data-pc-preset="preset-1" data-pc-direction="ltr" data-pc-theme="light">

  <div class="loader-bg">
    <div class="loader-track"><div class="loader-fill"></div></div>
  </div>

  <nav th:replace="~{layout/base :: sidebar}"></nav>
  <header th:replace="~{layout/base :: header}"></header>

  <div class="pc-container">
    <div class="pc-content">

      <div class="page-header">
        <div class="page-block">
          <div class="row align-items-center">
            <div class="col-md-12">
              <div class="page-header-title">
                <h5 class="m-b-10"
                    th:text="${producto.id} != null ? 'Editar Producto' : 'Nuevo Producto'"></h5>
              </div>
              <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="/dashboard/productos">Home</a></li>
                <li class="breadcrumb-item"><a href="/dashboard/productos">Productos</a></li>
                <li class="breadcrumb-item" aria-current="page"
                    th:text="${producto.id} != null ? 'Editar' : 'Nuevo'"></li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card">
            <div class="card-header">
              <h5 th:text="${producto.id} != null ? 'Editar Producto' : 'Nuevo Producto'"></h5>
            </div>
            <div class="card-body">
              <form th:action="@{/dashboard/productos}"
                    th:object="${producto}"
                    method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                  <label class="form-label fw-semibold">Nombre</label>
                  <input type="text"
                         class="form-control"
                         th:field="*{nombre}"
                         placeholder="Ej: Chaquetilla eléctrica..."
                         required>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Precio</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{precio}"
                           placeholder="0.00"
                           required>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Descripción</label>
                  <textarea class="form-control"
                            th:field="*{descripcion}"
                            rows="4"
                            placeholder="Agrega una breve descripción del producto..."></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Categoría</label>
                  <select class="form-select" th:field="*{categoria}">
                    <option value="">-- Selecciona una categoría --</option>
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nombre}">
                    </option>
                  </select>
                </div>

                <div class="d-flex gap-2 mt-4">
                  <button type="submit" class="btn btn-primary">
                    <i class="ti ti-device-floppy me-1"></i> Guardar
                  </button>
                  <a href="/dashboard/productos" class="btn btn-light-secondary">
                    <i class="ti ti-arrow-left me-1"></i> Volver
                  </a>
                </div>

              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer th:replace="~{layout/base :: footer}"></footer>

  <script src="/mantis/assets/js/plugins/popper.min.js"></script>
  <script src="/mantis/assets/js/plugins/simplebar.min.js"></script>
  <script src="/mantis/assets/js/plugins/bootstrap.min.js"></script>
  <script src="/mantis/assets/js/fonts/custom-font.js"></script>
  <script src="/mantis/assets/js/pcoded.js"></script>
  <script src="/mantis/assets/js/plugins/feather.min.js"></script>
  <script>layout_change('light');</script>
  <script>change_box_container('false');</script>
  <script>layout_rtl_change('false');</script>
  <script>preset_change("preset-1");</script>
  <script>font_change("Public-Sans");</script>

</body>
</html>
