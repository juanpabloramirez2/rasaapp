<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head}">
    <title th:text="'Galería - ' + ${producto?.nombre}">Galería</title>
</head>

<body data-pc-preset="preset-1" data-pc-direction="ltr" data-pc-theme="light">

    <div class="loader-bg">
        <div class="loader-track"><div class="loader-fill"></div></div>
    </div>

    <nav th:replace="~{layout/base :: sidebar}"></nav>
    <header th:replace="~{layout/base :: header}"></header>

    <div class="pc-container">
        <div class="pc-content">

            <div class="page-header">
                <div class="page-block">
                    <div class="row align-items-center">
                        <div class="col-md-12">
                            <div class="page-header-title">
                                <h5 class="m-b-10" th:text="'Galería de ' + ${producto?.nombre}"></h5>
                            </div>
                            <ul class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/dashboard/productos">Home</a></li>
                                <li class="breadcrumb-item"><a href="/dashboard/productos">Productos</a></li>
                                <li class="breadcrumb-item" aria-current="page">Imágenes</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-12">
                    <a th:href="@{/dashboard/imagenes/nueva/{id}(id=${productoId})}" 
                       class="btn btn-primary d-inline-flex align-items-center">
                        <i class="ti ti-circle-plus me-2"></i> Subir Nueva Imagen
                    </a>
                </div>
            </div>

            <div class="row">
                
                <div class="col-md-4 col-xl-3" th:each="img : ${imagenes}">
                    <div class="card h-100 shadow-none border">
                        <div class="card-body p-2 position-relative">
                            
                            <span th:if="${img.esPrincipal}" 
                                  class="badge bg-success position-absolute m-2" 
                                  style="top: 0; left: 0; z-index: 1;">
                                <i class="ti ti-star-filled me-1"></i> Principal
                            </span>

                            <div class="bg-light rounded overflow-hidden" style="height: 200px;">
                                <img th:src="${img.url}" 
                                     class="img-fluid w-100 h-100" 
                                     style="object-fit: cover;" 
                                     alt="Imagen del producto">
                            </div>

                            <div class="mt-3 d-flex justify-content-between align-items-center">
                                <div class="text-muted small">
                                    <i class="ti ti-id me-1"></i><span></span>
                                </div>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/dashboard/imagenes/editar/{id}(id=${img.id})}" 
                                       class="btn btn-icon btn-light-warning btn-sm">
                                        <i class="ti ti-edit"></i>
                                    </a>
                                    <a th:href="@{/dashboard/imagenes/eliminar/{id}(id=${img.id})}" 
                                       class="btn btn-icon btn-light-danger btn-sm"
                                       onclick="return confirm('¿Estás seguro de eliminar esta imagen permanentemente?')">
                                        <i class="ti ti-trash"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(imagenes)}">
                    <div class="mb-3">
                        <i class="ti ti-photo-off text-muted" style="font-size: 3rem;"></i>
                    </div>
                    <h5 class="text-muted">No hay imágenes para este producto</h5>
                    <p class="text-muted small">Sube una foto para comenzar a armar el catálogo.</p>
                </div>

            </div>

        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>

    <script src="/mantis/assets/js/plugins/popper.min.js"></script>
    <script src="/mantis/assets/js/plugins/simplebar.min.js"></script>
    <script src="/mantis/assets/js/plugins/bootstrap.min.js"></script>
    <script src="/mantis/assets/js/fonts/custom-font.js"></script>
    <script src="/mantis/assets/js/pcoded.js"></script>
    <script src="/mantis/assets/js/plugins/feather.min.js"></script>
    <script>layout_change('light'); change_box_container('false'); layout_rtl_change('false'); preset_change("preset-1"); font_change("Public-Sans");</script>

</body>
</html>
