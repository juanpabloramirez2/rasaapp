# ─────────────────────────────────────────────────────────────────
# Perfil DEV — activar con: SPRING_PROFILES_ACTIVE=dev
# Base de datos local. Flyway deshabilitado (Hibernate maneja schema).
# ─────────────────────────────────────────────────────────────────

# Base de datos (local)
spring.datasource.url=jdbc:mysql://localhost:3306/rasadb?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway deshabilitado en dev (usa ddl-auto=update)
spring.flyway.enabled=false

# Admin inicial (solo dev — en prod viene de variable de entorno)
app.admin.username=admin
app.admin.password=admin123

# Thymeleaf (recarga templates sin reiniciar)
spring.thymeleaf.cache=false

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Logs
logging.level.root=INFO
logging.level.com.rasadeportes=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
