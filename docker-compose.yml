services:

  # ── Base de datos MySQL ────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: rasaapp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:       ${DB_NAME:-rasadb}
      MYSQL_USER:           ${DB_USER}
      MYSQL_PASSWORD:       ${DB_PASS}
      MYSQL_ROOT_PASSWORD:  ${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rasanet

  # ── Aplicación Spring Boot ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rasaapp
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: "jdbc:mysql://db:3306/${DB_NAME:-rasadb}?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"
      DB_USER:          ${DB_USER}
      DB_PASS:          ${DB_PASS}
      ADMIN_USERNAME:   ${ADMIN_USERNAME}
      ADMIN_PASSWORD:   ${ADMIN_PASSWORD}
      SPRING_JPA_OPEN_IN_VIEW: "true"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - rasanet

# ── Volúmenes persistentes ──────────────────────────────────────
volumes:
  mysql_data:
  uploads_data:
  logs_data:

# ── Red interna ─────────────────────────────────────────────────
networks:
  rasanet:
    driver: bridge
