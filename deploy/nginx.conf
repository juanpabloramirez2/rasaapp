# =================================================================
# nginx.conf — Rasa Deportes
# Reemplaza __DOMAIN__ con tu dominio (lo hace install.sh con sed)
# Ruta en el servidor: /etc/nginx/sites-available/rasaapp
# =================================================================

# ── Redirección HTTP → HTTPS ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    # Solo permite el challenge de Let's Encrypt por HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__ www.__DOMAIN__;

    # ── SSL ───────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Cabeceras de seguridad ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;

    # ── Límites ───────────────────────────────────────────────────
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   10s;
    keepalive_timeout       65;
    send_timeout            30s;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Cache de activos estáticos (JS, CSS, fuentes, imágenes) ──
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|ico)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # Imágenes de productos (uploads): cache corta por si cambian
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        expires            7d;
        add_header         Cache-Control "public";
        access_log         off;
    }

    # ── Proxy principal → Spring Boot :8080 ──────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        proxy_connect_timeout  10s;
        proxy_send_timeout     90s;
        proxy_read_timeout     90s;

        # Buffer para respuestas grandes (catálogo con muchos productos)
        proxy_buffer_size          4k;
        proxy_buffers              8 8k;
        proxy_busy_buffers_size    16k;
    }

    # ── Bloquear acceso al actuator desde internet ────────────────
    location /actuator/ {
        deny all;
        return 403;
    }

    # ── Logs ──────────────────────────────────────────────────────
    access_log /var/log/nginx/rasaapp_access.log combined;
    error_log  /var/log/nginx/rasaapp_error.log warn;
}
